# GitHub Actions workflow: runs the deal monitor on a schedule.
#
# To customise:
#   - Edit the cron schedule below to change run frequency.
#   - Adjust python-version if you want a different Python.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   SHEET_CSV_URL   The URL to your published Google Sheet (CSV format).
#   NTFY_TOPIC      Your ntfy.sh topic name.

name: Check Deals

on:
  schedule:
    # Hourly at 17 minutes past, to avoid the top-of-hour stampede on
    # GitHub's runners. Cron is in UTC. Adjust the first field to change
    # the offset; e.g. '*/30 * * * *' for every 30 minutes.
    - cron: '17 * * * *'

  # Lets you trigger a run from the Actions tab for testing.
  workflow_dispatch:

# Required so the workflow can commit state.json back to the repo.
# Without this, the push step at the end fails with "permission denied".
permissions:
  contents: write

# Prevent overlapping runs. If a previous run is still going (e.g. a slow
# fetch), GitHub will queue this one rather than running both in parallel,
# which would race on the state.json commit.
concurrency:
  group: deal-monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10  # safety net; a single run should take <2 minutes

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          # Cache pip downloads keyed on requirements.txt -- shaves a few
          # seconds off each run and reduces load on PyPI.
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run deal monitor
        env:
          SHEET_CSV_URL: ${{ secrets.SHEET_CSV_URL }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python -m deal_monitor.main

      - name: Commit updated state
        # Only commit if state.json actually changed. Skipping no-op
        # commits keeps the repo history clean and avoids triggering
        # any other workflows that watch for pushes.
        run: |
          if [[ -n "$(git status --porcelain state.json)" ]]; then
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add state.json
            git commit -m "chore: update state $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          else
            echo "No state changes to commit."
          fi
